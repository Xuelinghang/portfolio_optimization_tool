stages:
  - test
  - build
  - deploy

# Step 1: Run Tests
test:
  stage: test
  image: python:3.10
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest tests/  # Run all unit tests
  only:
    - dev  # Run tests only on the 'dev' branch

# Step 2: Build the Application
build:
  stage: build
  image: python:3.10
  script:
    - echo "Building the application..."
  only:
    - dev

# Step 3: Deploy (Only for Main Branch)
deploy:
  stage: deploy
  image: python:3.10
  script:
    - echo "Deploying application to production..."
  only:
    - main
